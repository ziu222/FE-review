<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EC SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../asset/css/tailwind-built.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../asset/css/main.css">
    <link rel="stylesheet" href="../asset/css/profile.css">
</head>

<body>

    <!-- ── Navbar ──────────────────────────────────────────── -->
    <nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-sm">
        <div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto w-full">
            <div class="flex items-center gap-12">
                <a class="text-2xl font-bold tracking-tighter text-teal-900 font-headline no-underline hover:no-underline flex items-center gap-3" href="home.html">
                    <span>EC SHOP</span>
                </a>
                <div class="hidden lg:flex items-center gap-8">
                    <a class="text-slate-600 hover:text-teal-800 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline" href="home.html">Home</a>
                    <a class="text-slate-600 hover:text-teal-800 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline" href="product.html">Product</a>
                    <a class="text-slate-600 hover:text-teal-800 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline" href="#">About</a>
                    <a class="text-slate-600 hover:text-teal-800 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline" href="#">Contact</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <el-dropdown class="inline-block relative">
                    <button id="userBtn" class="p-2 text-teal-900 hover:bg-teal-50/50 rounded-full transition-all duration-300 active:scale-95">
                        <span id="userContent" class="material-symbols-outlined">person</span>
                    </button>
                    <div id="userMenu" class="hidden absolute right-0 mt-2 bg-white shadow rounded-lg overflow-hidden z-50"></div>
                </el-dropdown>
                <button id="cart-btn" class="cart-nav-btn" title="Giỏ hàng">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span>Cart</span>
                    <span id="cart-count" class="cart-nav-badge" style="display:none;">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="profile-main">
        <div class="profile-wrapper">

            <!-- ── LEFT: Profile form ──────────────────────── -->
            <div class="profile-card">

                <!-- Avatar + identity -->
                <div class="profile-avatar-row">
                    <div class="profile-avatar-wrap" id="avatarWrap">
                        <div class="profile-avatar" id="profileAvatar">?</div>
                        <div class="profile-avatar-edit">
                            <span class="material-symbols-outlined">photo_camera</span>
                            <span class="label">CHANGE</span>
                        </div>
                        <input type="file" id="avatarInput" accept="image/*" />
                    </div>
                    <div class="profile-identity">
                        <h2 id="profileDisplayName">—</h2>
                        <div class="profile-username" id="profileDisplayUsername">@—</div>
                    </div>
                </div>

                <form id="profileForm" novalidate>

                    <!-- Personal info -->
                    <div class="profile-section-title">Personal Information</div>

                    <div class="profile-field">
                        <label for="inputName">Full Name</label>
                        <input class="profile-input" type="text" id="inputName" placeholder="Your full name" autocomplete="name" />
                        <div class="profile-field-error" id="errorName"></div>
                    </div>

                    <div class="profile-field">
                        <label for="inputEmail">Email</label>
                        <input class="profile-input" type="email" id="inputEmail" placeholder="your@email.com" autocomplete="email" />
                        <div class="profile-field-error" id="errorEmail"></div>
                    </div>

                    <div class="profile-field">
                        <label for="inputUsername">Username</label>
                        <input class="profile-input" type="text" id="inputUsername" placeholder="username" autocomplete="username" />
                        <div class="profile-field-error" id="errorUsername"></div>
                    </div>

                    <!-- Change password -->
                    <div class="profile-section-title">Change Password</div>
                    <div class="profile-field">
                        <label for="inputCurrentPw">Current Password</label>
                        <input class="profile-input" type="password" id="inputCurrentPw" placeholder="Enter current password" autocomplete="current-password" />
                        <div class="profile-field-error" id="errorCurrentPw"></div>
                    </div>

                    <div class="profile-field">
                        <label for="inputNewPw">New Password</label>
                        <input class="profile-input" type="password" id="inputNewPw" placeholder="At least 6 characters" autocomplete="new-password" />
                        <div class="profile-field-error" id="errorNewPw"></div>
                    </div>

                    <div class="profile-field">
                        <label for="inputConfirmPw">Confirm New Password</label>
                        <input class="profile-input" type="password" id="inputConfirmPw" placeholder="Repeat new password" autocomplete="new-password" />
                        <div class="profile-field-error" id="errorConfirmPw"></div>
                    </div>

                    <button type="submit" class="profile-save-btn">
                        <span class="material-symbols-outlined">save</span>
                        Save Changes
                    </button>

                </form>
            </div>

            <!-- ── RIGHT: Sidebar ──────────────────────────── -->
            <div class="profile-sidebar">

                <!-- Wallet balance -->
                <div class="profile-balance-card">
                    <div class="profile-balance-label">Wallet Balance</div>
                    <div class="profile-balance-amount" id="profileBalance">$0.00</div>
                    <div class="profile-balance-sub">Available to spend</div>
                </div>

                <!-- Meta info -->
                <div class="profile-meta-card">
                    <div class="profile-meta-row">
                        <span class="material-symbols-outlined">calendar_month</span>
                        <span class="profile-meta-label">Member since</span>
                        <span class="profile-meta-value" id="metaMember">—</span>
                    </div>
                    <div class="profile-meta-row">
                        <span class="material-symbols-outlined">badge</span>
                        <span class="profile-meta-label">Account type</span>
                        <span class="profile-meta-value">Customer</span>
                    </div>
                </div>

                <!-- Quick actions -->
                <div class="profile-actions-card">
                    <div class="profile-actions-title">Quick Actions</div>
                    <a href="wallet.html" class="profile-quick-link">
                        <span class="material-symbols-outlined">account_balance_wallet</span>
                        Go to Wallet
                    </a>
                    <a href="cart.html" class="profile-quick-link">
                        <span class="material-symbols-outlined">shopping_cart</span>
                        My Cart
                    </a>
                    <button class="profile-quick-link" disabled style="opacity:0.5;cursor:not-allowed;">
                        <span class="material-symbols-outlined">receipt_long</span>
                        My Orders
                        <span class="link-soon">Soon</span>
                    </button>
                </div>

            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="profile-toast" id="profileToast">
        <span class="material-symbols-outlined" style="font-size:16px;">check_circle</span>
        <span class="toast-msg"></span>
    </div>

    <script src="../asset/js/model/product-data.js"></script>
    <script src="../asset/js/model/user-data.js"></script>
    <script src="../asset/js/model/order-data.js"></script>
    <script src="../asset/js/model/notification-data.js"></script>
    <script src="../asset/js/core/storage.js"></script>
    <script src="../asset/js/user/user-login.js"></script>
    <script src="../asset/js/user/addtocart.js"></script>
    <script src="../asset/js/user/profile.js"></script>
</body>

</html>
