<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - EC SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../asset/css/tailwind-built.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../asset/css/main.css">
    <link rel="stylesheet" href="../asset/css/product-detail.css">
    <link rel="stylesheet" href="../asset/css/product.css">
</head>

<body class="detail-page">

    <!-- ── Navbar ──────────────────────────────────────────── -->
    <nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-sm">
        <div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto w-full">
            <div class="flex items-center gap-12">
                <a class="text-2xl font-bold tracking-tighter text-teal-900 font-headline no-underline hover:no-underline flex items-center gap-3"
                    href="home.html">
                    <span>EC SHOP</span>
                </a>
                <div class="hidden lg:flex items-center gap-8">
                    <a class="text-slate-600 hover:text-teal-800 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline" href="home.html">Home</a>
                    <a class="text-slate-600 hover:text-teal-800 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline" href="product.html">Product</a>
                    <a class="text-slate-600 hover:text-teal-800 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline" href="#">About</a>
                    <a class="text-slate-600 hover:text-teal-800 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline" href="#">Contact</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <el-dropdown class="inline-block relative">
                    <button id="userBtn" class="p-2 text-teal-900 hover:bg-teal-50/50 rounded-full transition-all duration-300 active:scale-95">
                        <span id="userContent" class="material-symbols-outlined">person</span>
                    </button>
                    <div id="userMenu" class="hidden absolute right-0 mt-2 bg-white shadow rounded-lg overflow-hidden z-50">
                        <button onclick="logout()" class="block w-full text-left px-5 py-2 text-sm hover:bg-gray-100">Đăng xuất</button>
                        <button class="block w-full text-left px-5 py-2 text-sm hover:bg-gray-100">Tài khoản</button>
                        <button class="block w-full text-left px-5 py-2 text-sm hover:bg-gray-100">Hỗ trợ</button>
                    </div>
                </el-dropdown>
                <button id="cart-btn" class="p-2 text-teal-900 hover:bg-teal-50/50 rounded-full transition-all duration-300 active:scale-95 relative">
                    <span class="material-symbols-outlined">shopping_cart</span>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs px-1.5 rounded-full" style="display:none;">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-[72px]">

        <!-- Breadcrumb -->
        <div class="breadcrumb-bar">
            <a href="home.html">Home</a>
            <span class="sep">/</span>
            <a href="product.html">Products</a>
            <span class="sep">/</span>
            <span class="current" id="breadcrumb-name">Loading...</span>
        </div>

        <!-- Detail content injected by JS -->
        <div class="detail-wrapper" id="detail-content"></div>

        <!-- Related products -->
        <div class="related-section" id="related-section" style="display:none;">
            <h3>Sản phẩm liên quan</h3>
            <div class="related-grid product-grid" id="related-list"></div>
        </div>

    </main>

    <!-- Cart toast -->
    <div class="cart-toast" id="cartToast">
        <i class="fa-solid fa-circle-check"></i>
        <span>Đã thêm vào giỏ hàng!</span>
    </div>

    <!-- Scripts -->
    <script src="../asset/js/model/product-data.js"></script>
    <script src="../asset/js/model/user-data.js"></script>
    <script src="../asset/js/model/order-data.js"></script>
    <script src="../asset/js/model/notification-data.js"></script>
    <script src="../asset/js/core/storage.js"></script>
    <script src="../asset/js/core/auth.js"></script>
    <script src="../asset/js/user/user-login.js"></script>
    <script src="../asset/js/user/addtocart.js"></script>
    <script src="../asset/js/user/product-detail.js"></script>
</body>

</html>
