<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Sản phẩm - EC SHOP</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../asset/css/tailwind-built.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="../asset/css/main.css">
    <link rel="stylesheet" href="../asset/css/product.css">
</head>

<body>
    <nav class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-sm">
        <div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto w-full">
            <div class="flex items-center gap-12">
                <a class="text-2xl font-bold tracking-tighter text-teal-900 dark:text-teal-400 font-headline no-underline hover:no-underline flex items-center gap-3"
                    href="#">
                    <span>EC SHOP</span>
                </a>
                <div class="hidden lg:flex items-center gap-8">
                    <a class="text-slate-600 dark:text-slate-400 hover:text-teal-800 dark:hover:text-teal-300 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline"
                        href="home.html">Home</a>
                    <a class="text-slate-600 dark:text-slate-400 hover:text-teal-800 dark:hover:text-teal-300 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline"
                        href="#">Product</a>
                    <a class="text-slate-600 dark:text-slate-400 hover:text-teal-800 dark:hover:text-teal-300 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline"
                        href="#">About</a>
                    <a class="text-slate-600 dark:text-slate-400 hover:text-teal-800 dark:hover:text-teal-300 transition-colors text-sm font-medium tracking-wide no-underline hover:no-underline"
                        href="#">Contact</a>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="relative group hidden xl:block">
                    <input
                        class="bg-surface-container-highest border-none rounded-full py-2 pl-10 pr-4 w-64 text-sm focus:ring-2 focus:ring-primary transition-all"
                        placeholder="Search flagship boutique..." type="text" />
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 scale-90">search</span>
                </div>
                <div class="flex items-center gap-4">
                    <el-dropdown class="inline-block relative">
                        <button id="userBtn"
                            class="p-2 text-teal-900 dark:text-teal-400 hover:bg-teal-50/50 dark:hover:bg-teal-900/20 rounded-full transition-all duration-300 active:scale-95">
                            <span id="userContent" class="material-symbols-outlined">person</span>
                        </button>
                        <!-- Dropdown -->
                        <div id="userMenu"
                            class="hidden absolute right-0 mt-2 bg-white shadow rounded-lg overflow-hidden z-50">

                            <button onclick="logout()"
                                class="block w-full text-left px-6 py-2 whitespace-nowrap hover:bg-gray-100 dark:hover:bg-gray-700">
                                Đăng xuất
                            </button>
                            <button
                                class="block w-full text-left px-6 py-2 whitespace-nowrap hover:bg-gray-100 dark:hover:bg-gray-700">
                                Tài khoản
                            </button>
                            <button
                                class="block w-full text-left px-6 py-2 whitespace-nowrap hover:bg-gray-100 dark:hover:bg-gray-700">
                                Hỗ trợ
                            </button>
                        </div>
                    </el-dropdown>
                    <button id="cart-btn" class="cart-nav-btn" title="Giỏ hàng">
                        <span class="material-symbols-outlined">shopping_cart</span>
                        <span>Cart</span>
                        <span id="cart-count" class="cart-nav-badge" style="display:none;">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    <main class="pt-[72px]">
        <div class="hero-section">
            <div class="hero-container">
                <header class="header">
                    <h2>Shop Products</h2>
                </header>

                <div class="container">
                    <div class="product-grid" id="product-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="../asset/js/user/shop-product.js"></script>
    <script src="../asset/js/user/addtocart.js"></script>
    <script src="../asset/js/user/user-login.js"></script>
</body>

</html>
