<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>EC SHOP</title>
  <link rel="stylesheet" href="../asset/css/user-login.css">
</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
      <div class="logo"><a href="index.html">EC SHOP</a></div>

      <div class="auth-links">
        <a href="signup.html" class="active">SIGN UP</a>
        <a href="login.html">LOGIN</a>
      </div>

      <h1>Create Your Account</h1>
      <p class="subtitle">
        Create your account today for access to exclusive offers, discounts, and deals!
      </p>

      <form id="signupForm">
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <button type="submit">SIGN UP</button>
      </form>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
      <div class="image"></div>
    </div>
  </div>
  <script src="../asset/js/user/user-login.js"></script>
</body>

</html>
