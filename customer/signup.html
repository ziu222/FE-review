<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>EC SHOP</title>
  <link rel="stylesheet" href="../asset/css/user-login.css">
</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
      <div class="logo"><a href="home.html">EC SHOP</a></div>

      <div class="auth-links">
        <a href="signup.html" class="active">ĐĂNG KÝ</a>
        <a href="login.html">ĐĂNG NHẬP</a>
      </div>

      <h1>Đăng ký tài khoản</h1>
      <p class="subtitle">
        Đăng ký tài khoản để nhận nhiều ưu đãi từ cửa hàng!!
      </p>

      <form id="signupForm">
        <input type="text" placeholder="Tên người dùng">
        <input type="text" placeholder="Tên đăng nhập">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Mật khẩu">

        <button type="submit">Đăng ký</button>
      </form>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
      <div class="image"></div>
    </div>
  </div>
  <script src="../asset/js/user/user-signup.js"></script>
</body>

</html>
