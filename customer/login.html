<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>EC SHOP</title>
  <link rel="stylesheet" href="../asset/css/user-login.css">
</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
      <div class="logo"><a href="home.html">EC SHOP</a></div>

      <div class="auth-links">
        <a href="signup.html">ĐĂNG KÝ</a>
        <a href="login.html" class="active">ĐĂNG NHẬP</a>
      </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">
        Đăng nhập để mua hàng ngay !!
      </p>

      <form id="loginForm">
        <input type="text" placeholder="Tên đăng nhập">
        <input type="password" placeholder="Mật khẩu">

        <div class="extra">
          <label>
            <input type="checkbox"> Ghi nhớ tài khoản
          </label>
          <a href="#">Quên mật khẩu?</a>
        </div>
        <button type="submit">ĐĂNG NHẬP</button>
      </form>
    </div>
    <!-- RIGHT SIDE -->
    <div class="right">
      <div class="image"></div>
    </div>

  </div>

  <div class="customer-modal-overlay" id="customerModal" aria-hidden="true">
    <div class="customer-modal-panel" role="dialog" aria-modal="true" aria-labelledby="customerModalTitle" aria-describedby="customerModalMessage">
      <div class="customer-modal-icon" id="customerModalIcon" aria-hidden="true">✓</div>
      <h3 class="customer-modal-title" id="customerModalTitle">Success</h3>
      <p class="customer-modal-message" id="customerModalMessage">Action completed successfully.</p>
      <button type="button" class="customer-modal-btn" id="customerModalOk">Continue</button>
    </div>
  </div>

  <script src="../asset/js/user/user-login.js"></script>
</body>

</html>
