<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - EC SHOP</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../asset/css/user-login.css">
</head>

<body class="auth-page">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-title">EC SHOP</div>
      <div class="auth-logo-sub">Chào mừng bạn trở lại</div>
    </div>

    <div class="auth-tabs">
      <a href="login.html" class="auth-tab active">Đăng nhập</a>
      <a href="signup.html" class="auth-tab">Đăng ký</a>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <span class="material-symbols-outlined input-icon">person</span>
        <input type="text" placeholder="Tên đăng nhập" autocomplete="username">
      </div>
      <div class="input-group">
        <span class="material-symbols-outlined input-icon">lock</span>
        <input type="password" placeholder="Mật khẩu" autocomplete="current-password">
      </div>

      <div class="extra">
        <label>
          <input type="checkbox"> Ghi nhớ tài khoản
        </label>
        <a href="#">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn-auth">Đăng nhập</button>
    </form>

  </div>

  <div class="customer-modal-overlay" id="customerModal" aria-hidden="true">
    <div class="customer-modal-panel" role="dialog" aria-modal="true" aria-labelledby="customerModalTitle" aria-describedby="customerModalMessage">
      <div class="customer-modal-icon" id="customerModalIcon" aria-hidden="true">✓</div>
      <h3 class="customer-modal-title" id="customerModalTitle">Success</h3>
      <p class="customer-modal-message" id="customerModalMessage">Action completed successfully.</p>
      <button type="button" class="customer-modal-btn" id="customerModalOk">Continue</button>
    </div>
  </div>

  <script src="../asset/js/user/user-login.js"></script>
</body>

</html>
