<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>EC SHOP</title>
  <link rel="stylesheet" href="../asset/css/user-login.css">
</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
      <div class="logo"><a href="index.html">EC SHOP</a></div>

      <div class="auth-links">
        <a href="signup.html">SIGN UP</a>
        <a href="login.html" class="active">LOGIN</a>
      </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">
        Login to your account to continue shopping and access exclusive deals.
      </p>

      <form id="loginForm">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <div class="extra">
          <label>
            <input type="checkbox"> Remember me
          </label>
          <a href="#">Forgot Password?</a>
        </div>
        <button type="submit">LOGIN</button>
      </form>
    </div>
    <!-- RIGHT SIDE -->
    <div class="right">
      <div class="image"></div>
    </div>

  </div>
  <script src="../asset/js/user/user-login.js"></script>
</body>

</html>
