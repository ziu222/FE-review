<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-gray-200 min-h-screen flex items-center justify-center " >

    <div class="w-full max-w-6xl bg-white rounded-xl shadow-lg grid md:grid-cols-3 overflow-hidden relative overflow-visible">

        <!-- LEFT: CART ITEMS -->
        <div class="md:col-span-2 bg-white p-6">

            <h1 class="text-2xl font-bold mb-6">Giỏ hàng</h1>

            <!-- CART LIST (JS will render here) -->
            <div id="cart-items" class="space-y-4"></div>

        </div>

        <!-- RIGHT: SUMMARY -->
        <div class="bg-gray-100 p-6">

            <h2 class="text-xl font-bold mb-6">Chi tiết</h2>

            <div class="flex justify-between mb-2">
                <span class="text-gray-600">Tổng sản phẩm</span>
                <span id="total-items">0</span>
            </div>

            <div class="flex justify-between mb-4">
                <span class="text-gray-600">Thành tiền</span>
                <span id="total-price">$0</span>
            </div>

            <hr class="my-4">

            <input type="text" placeholder="Mã giảm giá"
                class="w-full p-2 border rounded mb-4 outline-none focus:ring-2 focus:ring-gray-400" />

            <button class="w-full bg-black text-white py-2 rounded hover:bg-gray-800 transition">
                Thanh toán
            </button>
        </div>
        <div id="back" class="absolute -bottom-12 left-1/2 -translate-x-1/2">
            <button class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                Back to shop
            </button>
        </div>
    </div>
    <script src="../asset/js/user/cart.js"></script>
</body>

</html>
