<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC SHOP - Shops Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../asset/css/admin-dashboard.css">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <a href="dashboard.html" class="sidebar-logo-text">EC SHOP</a>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="dashboard.html" class="nav-item">
            <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>
        <a href="shops-manage.html" class="nav-item active">
            <i class="fa-solid fa-store"></i> Shops
        </a>
        <a href="products.html" class="nav-item">
            <i class="fa-solid fa-box-open"></i> Products
        </a>
        <a href="../404.html" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i> Orders
        </a>
        <a href="../404.html" class="nav-item">
            <i class="fa-solid fa-users"></i> Customers
        </a>
        <a href="../404.html" class="nav-item">
            <i class="fa-solid fa-wallet"></i> Financial
        </a>
        <div class="nav-section-label">Support</div>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-gear"></i> Settings
        </a>
    </nav>
</aside>

<header class="topbar">
    <h1 class="topbar-title">Shops Management</h1>
    <div class="topbar-right">
        <div class="topbar-user">
            <div class="topbar-avatar" id="topbarAvatar">A</div>
            <span id="topbarUserName">Admin</span>
        </div>
        <button class="btn-logout" onclick="handleLogout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </div>
</header>

<main class="main-content">

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-card-label">Total Shops</span>
                <div class="stat-card-icon teal"><i class="fa-solid fa-store"></i></div>
            </div>
            <div class="stat-card-value" id="statTotal">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-card-label">Active</span>
                <div class="stat-card-icon green"><i class="fa-solid fa-circle-check"></i></div>
            </div>
            <div class="stat-card-value" id="statActive">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-card-label">Pending</span>
                <div class="stat-card-icon orange"><i class="fa-solid fa-clock"></i></div>
            </div>
            <div class="stat-card-value" id="statPending">0</div>
        </div>
    </div>

    <div class="card">
        <div class="toolbar">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="active">Active</button>
                <button class="filter-tab" data-filter="pending">Pending</button>
                <button class="filter-tab" data-filter="suspended">Suspended</button>
            </div>
            <div class="toolbar-right">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search shops...">
                </div>
                <button class="btn-primary" id="btnAddShop">
                    <i class="fa-solid fa-plus"></i> Add Shop
                </button>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Shop Name</th>
                        <th>Owner</th>
                        <th>Status</th>
                        <th>Products</th>
                        <th>Revenue</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="shopsTableBody"></tbody>
            </table>
        </div>

        <div class="table-empty" id="emptyState" style="display:none;">
            <i class="fa-solid fa-store-slash"></i>
            <p>No shops found</p>
        </div>
    </div>

</main>

<div class="modal-overlay" id="shopModal">
    <div class="modal-panel">
        <div class="modal-header">
            <h3 id="modalTitle">Shop Details</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer" id="modalFooter"></div>
    </div>
</div>

<div class="modal-overlay" id="formModal">
    <div class="modal-panel modal-panel-md">
        <div class="modal-header">
            <h3 id="formModalTitle">Add Shop</h3>
            <button class="modal-close" onclick="closeFormModal()">&times;</button>
        </div>
        <div class="modal-body">
            <form id="shopForm" autocomplete="off">
                <input type="hidden" id="formShopId" value="">
                <div class="form-group">
                    <label for="formShopName">Shop Name <span class="required">*</span></label>
                    <input type="text" id="formShopName" placeholder="Enter shop name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="formOwnerName">Owner Name <span class="required">*</span></label>
                        <input type="text" id="formOwnerName" placeholder="Enter owner name" required>
                    </div>
                    <div class="form-group">
                        <label for="formEmail">Email <span class="required">*</span></label>
                        <input type="email" id="formEmail" placeholder="Enter email" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="formPhone">Phone</label>
                        <input type="text" id="formPhone" placeholder="Enter phone number">
                    </div>
                    <div class="form-group">
                        <label for="formAddress">Address</label>
                        <input type="text" id="formAddress" placeholder="Enter address">
                    </div>
                </div>
                <div class="form-group">
                    <label for="formDescription">Description</label>
                    <textarea id="formDescription" rows="3" placeholder="Enter shop description"></textarea>
                </div>
                <div class="form-error" id="formError"></div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="modal-btn close" type="button" onclick="closeFormModal()">Cancel</button>
            <button class="modal-btn approve" type="button" id="formSubmitBtn">Add Shop</button>
        </div>
    </div>
</div>

<script src="../asset/js/model/product-data.js"></script>
<script src="../asset/js/model/user-data.js"></script>
<script src="../asset/js/model/order-data.js"></script>
<script src="../asset/js/model/storage.js"></script>
<script src="../asset/js/admin/admin.js"></script>
<script src="../asset/js/admin/admin-shops.js"></script>

</body>
</html>
