<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC SHOP - Admin Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../asset/css/admin-login.css">
</head>
<body>

<div class="login-page">

    <div class="login-logo">
        <span class="login-logo-text">EC SHOP</span>
    </div>

    <div class="login-card">
        <h1 class="login-title">Sign in to admin Dashboard</h1>

        <div id="loginError" class="login-error">
            Wrong username/email or password. Please try again.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="identifier">Username or Email</label>
                <input
                    class="form-input"
                    type="text"
                    id="identifier"
                    name="identifier"
                    placeholder="Username or Email"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Your password</label>
                <div class="password-wrapper">
                    <input
                        class="form-input"
                        type="password"
                        id="password"
                        name="password"
                        placeholder=""
                        required
                    >
                    <button type="button" class="password-toggle" id="togglePassword">Show</button>
                </div>
            </div>

            <button type="submit" class="login-btn">Log in</button>
        </form>

        <div class="login-footer">
            <a href="#">Forget your password</a>
        </div>

        <div class="login-divider"></div>

        <a href="#" class="signup-btn">welcome</a>
    </div>

</div>


<script src="../asset/js/model/product-data.js"></script>
<script src="../asset/js/model/user-data.js"></script>
<script src="../asset/js/model/order-data.js"></script>
<script src="../asset/js/core/storage.js"></script>
<script src="../asset/js/core/auth.js"></script>
<script src="../asset/js/admin/admin-login.js"></script>

</body>
</html>
