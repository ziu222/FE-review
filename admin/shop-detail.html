<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC SHOP - Shop Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../asset/css/admin-dashboard.css">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <a href="dashboard.html" class="sidebar-logo-text">EC SHOP</a>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="dashboard.html" class="nav-item">
            <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>
        <a href="shops-manage.html" class="nav-item active">
            <i class="fa-solid fa-store"></i> Shops
        </a>
        <a href="products.html" class="nav-item">
            <i class="fa-solid fa-box-open"></i> Products
        </a>
        <a href="orders-manage.html" class="nav-item">
            <i class="fa-solid fa-clipboard-list"></i> Orders
        </a>
        <a href="../404.html" class="nav-item">
            <i class="fa-solid fa-users"></i> Customers
        </a>
        <a href="../404.html" class="nav-item">
            <i class="fa-solid fa-bell"></i> Notifications
        </a>
        <div class="nav-section-label">Support</div>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-gear"></i> Settings
        </a>
    </nav>
</aside>

<header class="topbar">
    <div class="topbar-title">
        <a href="shops-manage.html" class="back-link"><i class="fa-solid fa-arrow-left"></i></a>
        <span id="pageTitle">Shop Details</span>
    </div>
    <div class="topbar-right">
        <div class="topbar-user">
            <div class="topbar-avatar" id="topbarAvatar">A</div>
            <span id="topbarUserName">Admin</span>
        </div>
        <button class="btn-logout" onclick="handleLogout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </div>
</header>

<main class="main-content">

    <div class="detail-header" id="detailHeader">
        <div class="detail-header-left">
            <div class="detail-avatar" id="shopInitial">S</div>
            <div>
                <h2 class="detail-name" id="shopName">—</h2>
                <p class="detail-sub" id="shopOwner">—</p>
            </div>
        </div>
        <div class="detail-header-actions" id="headerActions"></div>
    </div>

    <div class="stats-row stats-row-3">
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-card-label">Products</span>
                <div class="stat-card-icon teal"><i class="fa-solid fa-box-open"></i></div>
            </div>
            <div class="stat-card-value" id="statProducts">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-card-label">Total Revenue</span>
                <div class="stat-card-icon green"><i class="fa-solid fa-dollar-sign"></i></div>
            </div>
            <div class="stat-card-value" id="statRevenue">$0</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-card-label">Total Orders</span>
                <div class="stat-card-icon blue"><i class="fa-solid fa-clipboard-list"></i></div>
            </div>
            <div class="stat-card-value" id="statOrders">0</div>
        </div>
    </div>

    <div class="grid-2col">

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Shop Information</h3>
            </div>
            <div class="card-body" id="shopInfo"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Contact Details</h3>
            </div>
            <div class="card-body" id="contactInfo"></div>
        </div>

    </div>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Products</h3>
            <span class="card-count" id="productCount">0 items</span>
        </div>
        <div style="overflow-x: auto;">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody"></tbody>
            </table>
        </div>
        <div class="table-empty" id="emptyProducts" style="display:none;">
            <i class="fa-solid fa-box-open"></i>
            <p>No products yet</p>
        </div>
    </div>

</main>

<script src="../asset/js/model/product-data.js"></script>
<script src="../asset/js/model/user-data.js"></script>
<script src="../asset/js/model/order-data.js"></script>
<script src="../asset/js/model/storage.js"></script>
<script src="../asset/js/auth.js"></script>
<script src="../asset/js/admin/admin.js"></script>
<script src="../asset/js/admin/admin-shop-detail.js"></script>

</body>
</html>
